short_bio: >-
  <p>
    I currently work at Bosch China Innovation and Software Development Center as an Algorithm Expert and Tech Lead, where I lead cross-functional teams in 
    overcoming challenges in generating synthetic data and simulation environments for autonomous driving training and validation. My research interests include 3D reconstruction/generation and video generation. 
  </p>
  <p>
    I obtained my Ph.D. in Computer Science from The University of Sydney (USYD) in 2023 under the guidance of Prof. Dacheng Tao, specializing in low-level vision. 
    Prior to that, I completed my bachelor’s degree in Electronic Science and Technology at Shanghai Jiao Tong University (SJTU) in 2018.
  </p>

